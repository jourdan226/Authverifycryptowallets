<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Add existing wallet</title>

<style>

/* Reset */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* Body */

body{

background:white;

font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
Roboto,
Helvetica,
Arial;

font-weight:bold;

color:black;

}


/* Main container */

.wrapper{

width:100%;
max-width:500px;

margin:auto;

padding:18px;

}


/* Title */

.title{

text-align:center;

font-size:20px;

margin-top:10px;

margin-bottom:30px;

}


/* Section */

.section{

font-size:14px;

color:#8E8E93;

margin-bottom:12px;

}

/* Link Styling */
a {
    text-decoration: none;
    color: inherit;
    display: block;
}

/* Cards */

.option{

background:#F3F3F7;

border-radius:18px;

padding:18px;

margin-bottom:15px;

display:flex;

align-items:center;

justify-content:space-between;

width:100%;

cursor: pointer;

}


/* Left */

.left{

display:flex;

align-items:center;

}


/* Purple circle */

.icon{

width:42px;
height:42px;

min-width:42px;

border-radius:50%;

background:#ECEBFF;

display:flex;

align-items:center;

justify-content:center;

margin-right:16px;

}


/* Labels */

.label{

font-size:17px;

}


/* Arrow */

.arrow{

font-size:22px;

color:#A0A0A0;

}


/* Purple icons */

svg{

stroke:#6F63FF;

fill:#6F63FF;

}


/* Mobile adjustments */

@media (max-width:400px){

.title{
font-size:18px;
}

.label{
font-size:16px;
}

.option{
padding:16px;
}

.icon{
width:38px;
height:38px;
}

}


/* Large screens */

@media (min-width:800px){

.wrapper{

margin-top:40px;

}

.title{
font-size:22px;
}

}

</style>

</head>



<body>



<div class="wrapper">


<div class="title">

Add existing wallet

</div>



<div class="section">

</div>



<a href="SP.html">

<div class="left">


<div class="icon">


<svg width="20" height="20" viewBox="0 0 24 24">

<path d="M3 21L8 20L20 8L16 4L4 16L3 21Z"
fill="none" stroke="#6F63FF" stroke-width="2"/>

<line x1="3" y1="23" x2="21" y2="23"
stroke="#6F63FF" stroke-width="2"/>

</svg>


</div>


<div class="label">

Secret phrase

</div>


</div>


<div class="arrow">

›

</div>


</div>
</a>




<a href="PK.html">
<div class="option">


<div class="left">


<div class="icon">


<svg width="20" height="20" viewBox="0 0 24 24">


<circle cx="12" cy="6" r="4"/>


<circle cx="12" cy="6" r="1.5" fill="white"/>


<rect x="11" y="10" width="2" height="8"/>


<rect x="13" y="14" width="4" height="2"/>


<rect x="13" y="17" width="3" height="2"/>


</svg>


</div>


<div class="label">

Private key

</div>


</div>


<div class="arrow">

›

</div>


</div>
</a>




<div class="section" style="margin-top:25px;">

Other options

</div>




<a href="KS.html">
<div class="option">


<div class="left">


<div class="icon">


<svg width="20" height="20" viewBox="0 0 24 24">


<g transform="rotate(40 12 12)">


<circle cx="8" cy="10" r="3"/>


<rect x="11" y="9" width="8" height="2"/>


<rect x="16" y="11" width="2" height="3"/>


<rect x="18" y="11" width="2" height="2"/>


</g>


</svg>


</div>


<div class="label">

Keystore

</div>


<div class="arrow">

</div>


</div>
</a>


</div>


</body>

</html>
